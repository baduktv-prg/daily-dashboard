<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바둑TV 일일 편성 성과 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #12151e;
  --surface2: #181c28;
  --border: rgba(255,255,255,0.07);
  --text: #e2e6f0;
  --muted: #8a92a6;
  --accent: #5b8dee;
  --s: #3ecf8e;
  --a: #5b8dee;
  --b: #f5c842;
  --c: #e05c5c;
  --rerun: #9b7fe8;
  --orig: #3ecf8e;
  --card-title-color: #c8d0e0;
}
body.light-mode {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #e8ecf3;
  --border: rgba(0,0,0,0.08);
  --text: #1a1f2e;
  --muted: #6b748a;
  --accent: #3a6fd8;
  --s: #1aad6e;
  --a: #3a6fd8;
  --b: #c9a000;
  --c: #c93a3a;
  --rerun: #7a5fd0;
  --orig: #1aad6e;
  --card-title-color: #3a4560;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.2s, color 0.2s;
}

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 100;
  gap: 16px;
}
.logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
.logo span { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 12px; }

/* Theme toggle */
.theme-toggle {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px; padding: 6px 12px;
  border-radius: 6px; cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

.date-nav { display: flex; align-items: center; gap: 10px; }
.date-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  padding: 7px 14px;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  transition: all 0.15s;
  white-space: nowrap;
}
.date-nav button:hover { border-color: var(--accent); color: var(--accent); }
.date-display {
  font-family: 'DM Mono', monospace;
  font-size: 15px; font-weight: 500;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 18px;
  min-width: 140px; text-align: center;
  cursor: pointer; position: relative;
}
.date-display:hover { border-color: var(--accent); }
.date-picker-dropdown {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid rgba(128,128,128,0.2);
  border-radius: 10px; padding: 14px;
  min-width: 240px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.3);
  display: none; z-index: 200;
  max-height: 320px; overflow-y: auto;
}
.date-picker-dropdown.open { display: block; }
.date-picker-dropdown::-webkit-scrollbar { width: 4px; }
.date-picker-dropdown::-webkit-scrollbar-track { background: transparent; }
.date-picker-dropdown::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.month-group { margin-bottom: 12px; }
.month-label {
  font-size: 11px; color: var(--muted); font-weight: 500;
  letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 6px; padding-left: 2px;
}
.date-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.date-btn {
  padding: 5px 2px; text-align: center;
  border-radius: 4px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text); transition: all 0.1s;
}
.date-btn:hover { background: var(--surface2); }
.date-btn.active { background: var(--accent); color: #fff; font-weight: 500; }
.date-btn.no-data { color: var(--muted); cursor: default; }
.date-btn.no-data:hover { background: transparent; }

/* ── UPLOAD SCREEN ── */
#upload-screen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100vh - 53px);
  padding: 40px;
}
.drop-zone {
  width: 100%; max-width: 480px;
  border: 2px dashed rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 56px 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(91,141,238,0.05);
}
.drop-icon { font-size: 44px; margin-bottom: 18px; opacity: 0.5; display: block; }
.drop-zone h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.drop-zone p { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 22px; }
.drop-zone p strong { color: var(--accent); font-weight: 500; }
.drop-btn {
  background: var(--accent); color: #fff;
  border: none; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 600;
  padding: 10px 28px; border-radius: 8px;
  cursor: pointer; transition: opacity 0.15s;
}
.drop-btn:hover { opacity: 0.85; }
.drop-hint { margin-top: 16px; font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
#file-input { display: none; }

/* ── MAIN ── */
.main { padding: 28px 32px; max-width: 1440px; margin: 0 auto; }

/* ── KPI ── */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  position: relative; overflow: hidden;
}
.kpi::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--kc, var(--accent));
}
.kpi-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; font-weight: 500; }
.kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
.kpi-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
.kpi-delta { font-size: 12px; font-weight: 500; }
.delta-up { color: var(--s); }
.delta-down { color: var(--c); }

/* ── GRID ── */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.row3 { display: grid; grid-template-columns: 1.2fr 0.9fr 0.9fr; gap: 16px; margin-bottom: 16px; }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
}
.card-title {
  font-size: 12px;
  color: var(--card-title-color);
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px;
}
.card-title::before {
  content: ''; width: 4px; height: 14px;
  background: var(--accent); border-radius: 2px; flex-shrink: 0;
}

/* ── SLOT BAR ── */
.slot-bars { display: flex; flex-direction: column; gap: 14px; justify-content: center; height: 100%; }
.slot-row { display: flex; align-items: center; gap: 10px; }
.slot-label { width: 56px; font-size: 12px; color: var(--muted); text-align: right; flex-shrink: 0; font-weight: 500; }
.slot-tracks { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.track { height: 24px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.fill {
  height: 100%; border-radius: 5px;
  display: flex; align-items: center; padding: 0 9px;
  font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500;
  white-space: nowrap;
  transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
  color: rgba(255,255,255,0.9);
}

/* ── DONUT ── */
.donut-wrap { display: flex; align-items: center; gap: 20px; }
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 9px; }
.legend-row { display: grid; grid-template-columns: 10px 1fr auto auto; align-items: center; gap: 0 8px; font-size: 13px; }
.ldot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.lpct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
.lcount { font-family: 'DM Mono', monospace; font-size: 12px; }

/* ── BEST/WORST LIST ── */
.bw-list { display: flex; flex-direction: column; gap: 6px; }
.bw-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px;
  background: var(--surface2);
  border-radius: 7px;
  border-left: 3px solid transparent;
}
.bw-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bw-slot { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.bw-val { font-family: 'DM Mono', monospace; font-size: 12px; flex-shrink: 0; }

/* ── BUBBLE CHART ── */
#bubble-svg { width: 100%; }
.bubble-tooltip {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 500;
  max-width: 220px;
  line-height: 1.6;
}

/* ── RSI TABLE ── */
.rsi-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.rsi-table { width: 100%; border-collapse: collapse; min-width: 520px; }
.rsi-table th { font-size: 11px; color: var(--muted); font-weight: 600; padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.4px; }
.rsi-table th:nth-child(n+4) { text-align: center; }
.rsi-table td { padding: 8px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
.rsi-table tr:last-child td { border-bottom: none; }
.rsi-table tr:hover td { background: var(--surface2); }
.rsi-bar-wrap { display: flex; align-items: center; gap: 6px; }
.rsi-bar { height: 6px; border-radius: 3px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }

/* ── BC TABLE ── */
.bc-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.bc-table { width: 100%; border-collapse: collapse; min-width: 520px; }
.bc-table th { font-size: 11px; color: var(--muted); font-weight: 600; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
.bc-table td { padding: 8px 8px; font-size: 12px; border-bottom: 1px solid var(--border); }
.bc-table tr:last-child td { border-bottom: none; }
.bc-table tr:hover td { background: var(--surface2); }

/* ── BADGES ── */
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 4px;
  font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace;
}
.bs { background: rgba(62,207,142,0.15); color: var(--s); }
.ba { background: rgba(91,141,238,0.15); color: var(--a); }
.bb { background: rgba(245,200,66,0.15); color: var(--b); }
.bc { background: rgba(224,92,92,0.15); color: var(--c); }
.pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-r { background: rgba(155,127,232,0.15); color: var(--rerun); }
.pill-o { background: rgba(62,207,142,0.15); color: var(--orig); }
.mono { font-family: 'DM Mono', monospace; }

/* ── LOADING SPINNER ── */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(12,14,20,0.8);
  display: none; align-items: center; justify-content: center;
  z-index: 300;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 30px; height: 30px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY / ANIMS ── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.kpi { animation: fadeUp 0.4s ease both; }
.kpi:nth-child(1){animation-delay:0.04s}
.kpi:nth-child(2){animation-delay:0.08s}
.kpi:nth-child(3){animation-delay:0.12s}
.kpi:nth-child(4){animation-delay:0.16s}
.kpi:nth-child(5){animation-delay:0.20s}
.card { animation: fadeUp 0.4s ease 0.1s both; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE ── */
@media (max-width: 1200px) {
  .kpi-row { grid-template-columns: repeat(3, 1fr); }
  .row3 { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 900px) {
  .main { padding: 20px 16px; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .row2 { grid-template-columns: 1fr; }
  .row3 { grid-template-columns: 1fr; }
  .kpi-value { font-size: 22px; }
  .date-display { min-width: 110px; font-size: 13px; }
}
@media (max-width: 600px) {
  .kpi-row { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi { padding: 14px 14px; }
  .kpi-value { font-size: 20px; }
  .card { padding: 16px 14px; }
  .logo { font-size: 13px; }
  .theme-toggle { font-size: 11px; padding: 5px 8px; }
  .bc-table th:nth-child(7),
  .bc-table td:nth-child(7),
  .bc-table th:nth-child(8),
  .bc-table td:nth-child(8) { display: none; }
  .slot-bars {gap: 18px;},
  .track {height: 30px;}
}
</style>
</head>
<body>

<!-- Loading -->
<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">바둑TV <span>·</span> 일일 편성 성과 대시보드</div>
  <div class="topbar-right">
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">🌙 다크</button>
     <div style="display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden">
      <button id="toggle-daily" onclick="setMode('daily')" style="padding:6px 12px;font-size:12px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif">일간</button>
      <button id="toggle-weekly" onclick="setMode('weekly')" style="padding:6px 12px;font-size:12px;background:transparent;color:var(--muted);border:none;border-left:1px solid var(--border);cursor:pointer;font-family:'Noto Sans KR',sans-serif">주간</button>
      <button id="toggle-monthly" onclick="setMode('monthly')" style="padding:6px 12px;font-size:12px;background:transparent;color:var(--muted);border:none;border-left:1px solid var(--border);cursor:pointer;font-family:'Noto Sans KR',sans-serif">월간</button>
    </div>
    <div class="date-nav" id="date-nav">
      <button id="btn-prev">← 이전</button>
      <div class="date-display" id="date-display" onclick="togglePicker()">
        <span id="date-label">날짜 선택</span>
        <div class="date-picker-dropdown" id="date-picker" onclick="event.stopPropagation()"></div>
      </div>
      <button id="btn-next">다음 →</button>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div class="main" id="main-content">
  <div class="empty" style="font-size:16px;text-align:center;display:flex;align-items:center;justify-content:center;height:60vh">날짜를 선택하면 해당 일의 데이터가 표시됩니다.</div>
</div>

<div class="bubble-tooltip" id="tooltip"></div>

<script>
// ══════════════════════════════════════════
// THEME TOGGLE
// ══════════════════════════════════════════
function toggleTheme() {
  const body = document.body;
  const btn = document.getElementById('theme-toggle');
  const isLight = body.classList.toggle('light-mode');
  btn.textContent = isLight ? '🌙 다크' : '☀️ 라이트';
  localStorage.setItem('baduk-theme', isLight ? 'light' : 'dark');
}

// Restore saved theme
(function() {
  if (localStorage.getItem('baduk-theme') === 'light') {
    document.body.classList.add('light-mode');
    // btn not yet available; set after DOM ready
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = '🌙 다크';
    });
  }
})();

// ══════════════════════════════════════════
// DATA (pre-computed from Excel)
// ══════════════════════════════════════════

const ALL_DATA = {};
const DATES = [];

async function loadData() {
  const res = await fetch('./data.json');
  const json = await res.json();
  Object.assign(ALL_DATA, json.ALL_DATA);
  DATES.push(...json.DATES);
  buildPicker();
  renderDate(DATES[currentIdx]);
}
let currentIdx = DATES.length - 1;

// ══════════════════════════════════════════
// DATE PICKER
// ══════════════════════════════════════════
function getWeekOfMonth(dateStr) {
  const d = new Date(dateStr);
  const year = d.getFullYear();
  const month = d.getMonth();
  // 이번 주 월요일 구하기
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1; // 월=0...일=6
  const monday = new Date(d);
  monday.setDate(d.getDate() - dow);
  // 이달 1일 기준 첫 월요일(또는 그 이전 월요일) 구하기
  const first = new Date(year, month, 1);
  const firstDow = first.getDay() === 0 ? 6 : first.getDay() - 1;
  const firstMonday = new Date(first);
  if (firstDow > 0) firstMonday.setDate(1 - firstDow);
  // 주차 계산
  return Math.floor((monday - firstMonday) / (7 * 86400000)) + 1;
}

function getWeekStart(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
  d.setDate(d.getDate() - dow);
  return d.toISOString().slice(0, 10);
}

function buildPicker() {
  const picker = document.getElementById('date-picker');
  if (currentMode === 'daily') {
    buildDailyPicker(picker);
  } else if (currentMode === 'weekly') {
    buildWeeklyPicker(picker);
  } else {
    buildMonthlyPicker(picker);
  }
}

function buildDailyPicker(picker) {
  const dayNames = ['월','화','수','목','금','토','일'];
  const getDow = d => {
    const day = new Date(d).getDay();
    return day === 0 ? 6 : day - 1;
  };

  const byMonth = {};
  for (const d of DATES) {
    const m = d.slice(0, 7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(d);
  }

  let html = '';
  for (const [month, dates] of Object.entries(byMonth)) {
    const [y, m] = month.split('-');

    // 주차별 그룹핑
    const byWeek = {};
    dates.forEach(d => {
      const w = getWeekOfMonth(d);
      if (!byWeek[w]) byWeek[w] = [];
      byWeek[w].push(d);
    });

    html += `<div class="month-group">
      <div class="month-label">${y}년 ${parseInt(m)}월</div>
      <div class="date-grid" style="grid-template-columns:repeat(7,1fr);gap:3px">`;

    // 요일 헤더
    dayNames.forEach((dn, i) => {
      const color = i === 5 ? '#5b8dee' : i === 6 ? '#e05c5c' : 'var(--muted)';
      html += `<div style="text-align:center;font-size:10px;color:${color};padding:2px 0">${dn}</div>`;
    });

    Object.entries(byWeek).forEach(([w, wDates]) => {
      const cells = Array(7).fill(null);
      wDates.forEach(d => { cells[getDow(d)] = d; });
      cells.forEach((d, i) => {
        if (d) {
          const isSat = i === 5, isSun = i === 6;
          const color = isSat ? '#5b8dee' : isSun ? '#e05c5c' : 'var(--text)';
          html += `<div class="date-btn" data-date="${d}" onclick="selectDate('${d}')" style="color:${color}">${parseInt(d.slice(8))}</div>`;
        } else {
          html += `<div></div>`;
        }
      });
    });

    html += `</div></div>`;
  }
  picker.innerHTML = html;
}

function buildWeeklyPicker(picker) {
  const dayNames = ['월','화','수','목','금','토','일'];
  const getDow = d => { const day = new Date(d).getDay(); return day === 0 ? 6 : day - 1; };

  // 날짜를 실제 월별로 그룹핑
  const byMonth = {};
  DATES.forEach(d => {
    const m = d.slice(0, 7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(d);
  });

  let html = '';
  for (const [month, dates] of Object.entries(byMonth).sort()) {
    const [y, m] = month.split('-');

    // 이 달에 속한 날짜들을 weekStart로 그룹핑
    const byWeek = {};
    dates.forEach(d => {
      const ws = getWeekStart(d);
      if (!byWeek[ws]) byWeek[ws] = [];
      byWeek[ws].push(d);
    });

    html += `<div class="month-group">
      <div class="month-label">${y}년 ${parseInt(m)}월</div>
      <div style="display:grid;grid-template-columns:26px repeat(7,1fr);gap:3px">
        <div></div>`;
    dayNames.forEach((dn, i) => {
      const color = i === 5 ? '#5b8dee' : i === 6 ? '#e05c5c' : 'var(--muted)';
      html += `<div style="text-align:center;font-size:10px;color:${color};padding:3px 0;font-weight:500">${dn}</div>`;
    });

    let wNum = 1;
    for (const [ws, wDates] of Object.entries(byWeek).sort()) {
      const isSelected = selectedWeeks.has(ws);
      html += `<div onclick="toggleWeek('${ws}')"
        style="background:${isSelected?'var(--accent)':'var(--surface2)'};color:${isSelected?'#fff':'var(--muted)'};font-size:10px;border-radius:3px;text-align:center;cursor:pointer;padding:5px 0;line-height:1">${wNum}</div>`;

      // 7칸 배치 - 이 달에 속한 날짜만 표시, 나머지는 빈 칸
      const cells = Array(7).fill(null);
      wDates.forEach(d => { cells[getDow(d)] = d; });
      cells.forEach((d, i) => {
        if (d) {
          const color = i === 5 ? '#5b8dee' : i === 6 ? '#e05c5c' : 'var(--text)';
          html += `<div class="date-btn" data-date="${d}" onclick="selectDate('${d}')" style="color:${color}">${parseInt(d.slice(8))}</div>`;
        } else {
          html += `<div></div>`;
        }
      });
      wNum++;
    }
    html += `</div></div>`;
  }
  picker.innerHTML = html;
}

let selectedWeeks = new Set();

function toggleWeek(ws) {
  if (selectedWeeks.has(ws)) {
    selectedWeeks.delete(ws);
  } else {
    selectedWeeks.add(ws);
  }
  if (selectedWeeks.size === 0) {
    buildWeeklyPicker(document.getElementById('date-picker'));
    return;
  }
  // weekStart 기준 월~일 날짜 수집
  const allDates = [];
  selectedWeeks.forEach(weekStart => {
    const monday = new Date(weekStart);
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const ds = d.toISOString().slice(0, 10);
      if (DATES.includes(ds)) allDates.push(ds);
    }
  });
  allDates.sort();
  currentIdx = DATES.indexOf(allDates[allDates.length-1]);
  buildWeeklyPicker(document.getElementById('date-picker'));
  renderPeriodFromDates(allDates, 'weekly');
}

function buildMonthlyPicker(picker) {
  const months = [...new Set(DATES.map(d => d.slice(0,7)))];
  let html = '';
  let prevY = '';
  for (const ym of months) {
    const [y, m] = ym.split('-');
    if (y !== prevY) {
      if (prevY) html += '</div></div>';
      html += `<div class="month-group"><div class="month-label">${y}년</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px">`;
      prevY = y;
    }
    html += `<div class="date-btn" onclick="selectMonth('${ym}')">${parseInt(m)}월</div>`;
  }
  if (prevY) html += '</div></div>';
  picker.innerHTML = html;
}

function togglePicker() {
  document.getElementById('date-picker').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.date-display'))
    document.getElementById('date-picker').classList.remove('open');
});

function selectDate(date) {
  currentIdx = DATES.indexOf(date);
  if (currentMode === 'daily') {
    renderDate(date);
  } else {
    renderPeriod(currentMode, date);
  }
  document.getElementById('date-picker').classList.remove('open');
}

function selectWeek(anchorDate) {
  currentIdx = DATES.indexOf(anchorDate);
  renderPeriod('weekly', anchorDate);
  document.getElementById('date-picker').classList.remove('open');
}

function selectMonth(ym) {
  const monthDates = DATES.filter(d => d.startsWith(ym));
  if (!monthDates.length) return;
  currentIdx = DATES.indexOf(monthDates[0]);
  renderPeriod('monthly', monthDates[0]);
  document.getElementById('date-picker').classList.remove('open');
}

document.addEventListener('DOMContentLoaded', () => {
  loadData();

  document.getElementById('btn-prev').onclick = () => {
    if (currentMode === 'daily') {
      if (currentIdx > 0) { currentIdx--; renderDate(DATES[currentIdx]); }
    } else if (currentMode === 'weekly') {
      if (currentIdx >= 7) { currentIdx -= 7; } else { currentIdx = 0; }
      renderPeriod('weekly', DATES[currentIdx]);
    } else {
      const cur = DATES[currentIdx];
      const ym = cur.slice(0,7);
      const prevMonthDates = DATES.filter(d => d.slice(0,7) < ym);
      if (prevMonthDates.length) {
        const last = prevMonthDates[prevMonthDates.length-1];
        currentIdx = DATES.indexOf(last);
        renderPeriod('monthly', last);
      }
    }
  };
  document.getElementById('btn-next').onclick = () => {
    if (currentMode === 'daily') {
      if (currentIdx < DATES.length - 1) { currentIdx++; renderDate(DATES[currentIdx]); }
    } else if (currentMode === 'weekly') {
      if (currentIdx + 7 < DATES.length) { currentIdx += 7; } else { currentIdx = DATES.length - 1; }
      renderPeriod('weekly', DATES[currentIdx]);
    } else {
      const cur = DATES[currentIdx];
      const ym = cur.slice(0,7);
      const nextMonthDates = DATES.filter(d => d.slice(0,7) > ym);
      if (nextMonthDates.length) {
        const first = nextMonthDates[0];
        currentIdx = DATES.indexOf(first);
        renderPeriod('monthly', first);
      }
    }
  };
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  document.getElementById('btn-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('btn-next').click();
  });
});

// SLOT BARS

function renderSlotBars(d) {
  const slots  = ['새벽','오전','준프라임','프라임'];
  const colors = ['#5b8dee','#9b7fe8','#3ecf8e','#f5c842'];
  const maxR = Math.max(...slots.map(s => d.slot_rating[s] || 0)) * 1.1 || 1;
  const maxS = Math.max(...slots.map(s => d.slot_share[s]  || 0)) * 1.1 || 1;

  document.getElementById('slot-bars').innerHTML = slots.map((sl, i) => {
    const r = d.slot_rating[sl] || 0;
    const s = d.slot_share[sl]  || 0;
    if (!r && !s) return '';
    const rw = (r / maxR * 100).toFixed(1);
    const sw = (s / maxS * 85).toFixed(1);
    return `<div class="slot-row">
      <div class="slot-label">${sl}</div>
      <div class="slot-tracks">
        <div class="track">
          <div class="fill" style="width:${rw}%;background:${colors[i]}cc">시청률 ${r.toFixed(3)}%</div>
        </div>
        <div class="track" style="height:16px">
          <div class="fill" style="width:${sw}%;background:${colors[i]}55;font-size:9px">점유율 ${s.toFixed(3)}%</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
// DONUT
// ══════════════════════════════════════════
function renderDonut(d, prevD) {
  const grades = [
    { g:'S', color:'#3ecf8e', label:'S등급' },
    { g:'A', color:'#5b8dee', label:'A등급' },
    { g:'B', color:'#f5c842', label:'B등급' },
    { g:'C', color:'#e05c5c', label:'C등급' },
  ];
  const total = Object.values(d.grade_counts).reduce((a,b)=>a+b,0);
  if (!total) return;

  const svg = document.getElementById('donut-svg');
  const leg = document.getElementById('donut-legend');
  svg.setAttribute('width','150'); svg.setAttribute('height','150'); svg.setAttribute('viewBox','0 0 150 150');
  const cx=75, cy=75, r=58, sw=18;
  let cum = -Math.PI/2;
  let svgHtml = '', legHtml = '';

  grades.forEach(({ g, color, label }) => {
    const cnt = d.grade_counts[g] || 0;
    if (!cnt) return;
    const pct   = cnt / total;
    const angle = pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(cum);
    const y1 = cy + r * Math.sin(cum);
    const x2 = cx + r * Math.cos(cum + angle);
    const y2 = cy + r * Math.sin(cum + angle);
    const large = angle > Math.PI ? 1 : 0;
    svgHtml += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z"
      fill="${color}22" stroke="${color}" stroke-width="2"/>`;
    cum += angle;

    const prevCnt = prevD ? (prevD.grade_counts[g] || 0) : null;
    const diff = prevCnt != null ? cnt - prevCnt : null;
    const diffHtml = diff == null ? '' :
      diff > 0 ? `<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--s);background:rgba(62,207,142,0.12);padding:2px 7px;border-radius:4px;white-space:nowrap">▲ +${diff}편</span>` :
      diff < 0 ? `<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--c);background:rgba(224,92,92,0.12);padding:2px 7px;border-radius:4px;white-space:nowrap">▼ ${diff}편</span>` :
      `<span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:4px;white-space:nowrap">± 0편</span>`;

    legHtml += `<div class="legend-row">
      <div class="ldot" style="background:${color}"></div>
      <span>${label}</span>
      <span class="lcount" style="color:${color}">${cnt}편 (${(pct*100).toFixed(0)}%)</span>
      ${diffHtml}
    </div>`;
  });

  svgHtml += `<circle cx="${cx}" cy="${cy}" r="${r-sw}" fill="var(--surface)"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="22" font-weight="700" fill="var(--text)" font-family="DM Mono">${total}</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="Noto Sans KR">총 편성</text>`;

  svg.innerHTML = svgHtml;

  const headerRow = `<div style="display:grid;grid-template-columns:10px 1fr auto auto;gap:0 8px;font-size:10px;color:var(--muted);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border)">
    <span></span><span></span><span></span><span style="text-align:right">전일 대비</span>
  </div>`;

  leg.innerHTML = (prevD ? headerRow : '') + legHtml;
  const prevLabel = document.getElementById('donut-prev-label');
  if (prevLabel) prevLabel.textContent = '';
}

// ══════════════════════════════════════════
// BUBBLE CHART
// ══════════════════════════════════════════
function renderBubble(d) {
  const svg   = document.getElementById('bubble-svg');
  const progs = d.all_programs || [];
  if (!progs.length) {
    svg.innerHTML = `<text x="210" y="110" text-anchor="middle" fill="#5a6070" font-size="12" font-family="Noto Sans KR">데이터 없음</text>`;
    return;
  }

  const W=420, H=230, pad={l:40,r:20,t:30,b:30};
  const xs   = progs.map(p => p['점유율'] || 0);
  const ys   = progs.map(p => p['도달률'] || 0);
  const rs   = progs.map(p => p['시청률'] || 0);
  const xmax = Math.max(...xs) * 1.15 || 1;
  const ymax = Math.max(...ys) * 1.15 || 1;
  const rmax = Math.max(...rs) || 0.01;

  const toX = v => pad.l + (v / xmax) * (W - pad.l - pad.r);
  const toY = v => H - pad.b - (v / ymax) * (H - pad.t - pad.b);
  const toR = v => 5 + (v / rmax) * 16;
  const rerunColor = '#9b7fe8';
  const origColor  = '#3ecf8e';

  let html = `
    <line x1="${pad.l}" y1="${H-pad.b}" x2="${W-pad.r}" y2="${H-pad.b}" stroke="#2a2f40" stroke-width="1"/>
    <line x1="${pad.l}" y1="${pad.t}"   x2="${pad.l}"   y2="${H-pad.b}" stroke="#2a2f40" stroke-width="1"/>
    <text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="#5a6070" font-family="Noto Sans KR">점유율</text>
    <text x="10" y="${H/2}" text-anchor="middle" font-size="9" fill="#5a6070" font-family="Noto Sans KR" transform="rotate(-90,10,${H/2})">도달률</text>
    <!-- 범례 -->
    <circle cx="${W-100}" cy="${pad.t-12}" r="5" fill="${origColor}33" stroke="${origColor}" stroke-width="1.5"/>
    <text x="${W-92}" y="${pad.t-8}" font-size="9" fill="#8a92a6" font-family="Noto Sans KR">본방</text>
    <circle cx="${W-60}" cy="${pad.t-12}" r="5" fill="${rerunColor}33" stroke="${rerunColor}" stroke-width="1.5"/>
    <text x="${W-52}" y="${pad.t-8}" font-size="9" fill="#8a92a6" font-family="Noto Sans KR">재방</text>`;

  progs.forEach((p, i) => {
    const cx = toX(p['점유율'] || 0);
    const cy = toY(p['도달률'] || 0);
    const cr = toR(p['시청률'] || 0);
    const col = p['재방'] ? rerunColor : origColor;
    html += `<circle cx="${cx}" cy="${cy}" r="${cr}"
      fill="${col}33" stroke="${col}" stroke-width="1.5"
      class="bubble" data-idx="${i}" style="cursor:pointer;transition:r 0.15s"/>`;
  });

  svg.innerHTML = html;

  const tooltip = document.getElementById('tooltip');
  svg.querySelectorAll('.bubble').forEach(b => {
    const p = progs[parseInt(b.dataset.idx)];
    b.onmouseenter = () => {
      const g = p['주등급'] || '';
      tooltip.innerHTML = `
        <div style="font-weight:600;margin-bottom:4px;font-size:11px">${p['프로그램명']}</div>
        <div style="color:#5a6070">${p['시간대']} · <span class="badge b${g.toLowerCase()}">${g}</span>
          · <span class="pill ${p['재방']?'pill-r':'pill-o'}">${p['재방']?'재방':'본방'}</span></div>
        <div style="margin-top:6px">시청률 <span class="mono">${(p['시청률']||0).toFixed(3)}%</span></div>
        <div>점유율 <span class="mono">${(p['점유율']||0).toFixed(3)}%</span></div>
        <div>도달률 <span class="mono">${((p['도달률']||0)*100).toFixed(1)}%</span></div>`;
      tooltip.style.opacity = 1;
    };
    b.onmousemove = e => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top  = (e.clientY - 10) + 'px';
    };
    b.onmouseleave = () => { tooltip.style.opacity = 0; };
  });
}

function renderComp(d) {
  const el = document.getElementById('comp-bars');
  const comp = d.comp || {};
  const channels = [
    { name:'바둑TV', key:'자사(바둑TV)', color:'var(--accent)' },
    { name:'K바둑',  key:'K바둑',        color:'var(--s)' },
    { name:'브레인TV', key:'브레인TV',    color:'var(--b)' },
    { name:'GOLF&PBA', key:'GOLF&PBA',   color:'var(--rerun)' },
    { name:'빌리어즈TV', key:'빌리어즈TV', color:'var(--muted)' },
  ];
  const maxV = Math.max(...channels.map(c => comp[c.key] || 0)) * 1.15 || 1;
  el.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px">' +
    channels.map(c => {
      const v = comp[c.key] || 0;
      const w = (v / maxV * 100).toFixed(1);
      const isSelf = c.key === '자사(바둑TV)';
      return `<div style="display:flex;align-items:center;gap:10px">
        <div style="width:60px;font-size:11px;color:${isSelf ? 'var(--text)' : 'var(--muted)'};font-weight:${isSelf?'700':'400'};text-align:right;flex-shrink:0">${c.name}</div>
        <div style="flex:1;height:22px;background:var(--surface2);border-radius:5px;overflow:hidden">
          <div style="width:${w}%;height:100%;background:${c.color};opacity:${isSelf?1:0.6};border-radius:5px;display:flex;align-items:center;padding:0 8px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.9);white-space:nowrap;transition:width 0.8s cubic-bezier(0.22,1,0.36,1)">${v.toFixed(3)}%</div>
        </div>
      </div>`;
    }).join('') + '</div>';
}

// ══════════════════════════════════════════
function renderBW(d) {
  const el = document.getElementById('bw-list');
  const gb = g => `<span class="badge b${(g||'').toLowerCase()}">${g||''}</span>`;

  let html = '<div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px">▲ 시청률 BEST</div>';
  html += '<div class="bw-list">';
  (d.best || []).forEach(p => {
    html += `<div class="bw-item" style="border-left-color:var(--s)">
      <span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재':'본'}</span>
      <span class="bw-name">${p.프로그램명}</span>
      <span class="bw-slot">${p.시간대}</span>
      ${gb(p.주등급)}
      <span class="bw-val" style="color:var(--s)">${(p.시청률||0).toFixed(3)}%</span>
    </div>`;
  });
  html += '</div><div style="font-size:10px;color:var(--muted);margin:14px 0 8px;letter-spacing:0.5px">▼ 시청률 WORST</div><div class="bw-list">';
  (d.worst || []).forEach(p => {
    html += `<div class="bw-item" style="border-left-color:var(--c)">
      <span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재':'본'}</span>
      <span class="bw-name">${p.프로그램명}</span>
      <span class="bw-slot">${p.시간대}</span>
      ${gb(p.주등급)}
      <span class="bw-val" style="color:var(--c)">${(p.시청률||0).toFixed(3)}%</span>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ══════════════════════════════════════════
// RSI (프로그램별)
// ══════════════════════════════════════════
function renderRSI(d) {
  const progs = d.all_programs || [];
  const competitors = ['rsi_K바둑','rsi_브레인TV','rsi_GOLF&PBA','rsi_빌리어즈TV'];

  const fmtRsi = v => {
    if (!v || v <= 0) return `<span style="color:var(--muted)">-</span>`;
    const col = v >= 1 ? 'var(--s)' : 'var(--c)';
    return `<span class="mono" style="color:${col}">${v.toFixed(2)}</span>`;
  };

  document.getElementById('rsi-body').innerHTML = progs.map(p => {
    const g = p.주등급 || '';
    const pill = p.재방
      ? `<span class="pill pill-r">재방</span>`
      : `<span class="pill pill-o">본방</span>`;
    return `<tr>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${pill} ${p.프로그램명}
      </td>
      <td style="color:var(--muted)">${p.시간대}</td>
      <td><span class="badge b${g.toLowerCase()}">${g}</span></td>
      ${competitors.map(k => `<td style="text-align:center">${fmtRsi(p[k])}</td>`).join('')}
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:16px">데이터 없음</td></tr>';
}

// ══════════════════════════════════════════
// BC TABLE
// ══════════════════════════════════════════
function renderBC(d) {
  const progs = d.bc_programs || [];
  if (!progs.length) {
    document.getElementById('bc-body').innerHTML =
      '<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:16px">B/C 등급 프로그램 없음</td></tr>';
    return;
  }
  document.getElementById('bc-body').innerHTML = progs.map(p => {
    const g = p.주등급 || '';
    return `<tr>
      <td>${p.프로그램명}</td>
      <td><span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재방':'본방'}</span></td>
      <td style="color:var(--muted)">${p.시간대}</td>
      <td><span class="badge b${g.toLowerCase()}">${g}</span></td>
      <td class="mono">${(p.시청률||0).toFixed(3)}%</td>
      <td class="mono">${(p.점유율||0).toFixed(3)}%</td>
      <td class="mono">${p.도달률 != null ? ((p.도달률||0)*100).toFixed(1)+'%' : '-'}</td>
      <td class="mono">${p.몰입률 != null ? (p.몰입률*100||0).toFixed(1)+'%' : '-'}</td>
    </tr>`;
  }).join('');
}
// ══════════════════════════════════════════
// MODE (daily / weekly / monthly)
// ══════════════════════════════════════════
let currentMode = 'daily';

function setMode(mode) {
  currentMode = mode;
  const btns = {
    daily:   document.getElementById('toggle-daily'),
    weekly:  document.getElementById('toggle-weekly'),
    monthly: document.getElementById('toggle-monthly'),
  };
  Object.entries(btns).forEach(([k, b]) => {
    if (!b) return;
    b.style.background = k === mode ? 'var(--accent)' : 'transparent';
    b.style.color      = k === mode ? '#fff' : 'var(--muted)';
  });
  buildPicker(); // 모드에 맞게 피커 재빌드
  const date = DATES[currentIdx] || DATES[DATES.length - 1];
  if (mode === 'daily') {
    renderDate(date);
  } else {
    renderPeriod(mode, date);
  }
}

// 기간 내 날짜 목록 반환
function getPeriodDates(mode, anchorDate) {
  if (mode === 'weekly') {
    // anchorDate가 속한 주차(월 기준)의 모든 날짜
    const ym = anchorDate.slice(0,7);
    const w = getWeekOfMonth(anchorDate);
    return DATES.filter(d => d.startsWith(ym) && getWeekOfMonth(d) === w);
  } else { // monthly
    const ym = anchorDate.slice(0, 7);
    return DATES.filter(d => d.startsWith(ym));
  }
}

// 기간 집계
function aggregatePeriod(dates) {
  const ds = dates.map(d => ALL_DATA[d]).filter(Boolean);
  if (!ds.length) return null;

  // 평균 시청률
  const avgRating = ds.reduce((s, d) => s + d.avg_rating, 0) / ds.length;

  // 프라임 시청률 평균
  const primeRatings = ds.map(d => d.slot_rating['프라임']).filter(v => v != null);
  const primeAvg = primeRatings.length ? primeRatings.reduce((a,b)=>a+b,0)/primeRatings.length : null;

  // 레저채널 내 점유율 평균
  const ccsVals = ds.map(d => d.ccs).filter(v => v != null);
  const ccsAvg = ccsVals.length ? ccsVals.reduce((a,b)=>a+b,0)/ccsVals.length : null;

  // S/A 등급 비율
  let totalGrade = 0, saCount = 0;
  const gradeSums = {};
  ds.forEach(d => {
    Object.entries(d.grade_counts).forEach(([g, cnt]) => {
      gradeSums[g] = (gradeSums[g]||0) + cnt;
      totalGrade += cnt;
      if (g==='S'||g==='A') saCount += cnt;
    });
  });
  const saPct = totalGrade ? (saCount/totalGrade*100).toFixed(0) : 0;

  // 시간대별 평균
  const slots = ['새벽','오전','준프라임','프라임'];
  const slot_rating = {}, slot_share = {};
  slots.forEach(sl => {
    const vals = ds.map(d => d.slot_rating[sl]).filter(v=>v!=null);
    const svals = ds.map(d => d.slot_share[sl]).filter(v=>v!=null);
    slot_rating[sl] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    slot_share[sl]  = svals.length ? svals.reduce((a,b)=>a+b,0)/svals.length : null;
  });

  // 경쟁채널 평균
  const channels = ['자사(바둑TV)','K바둑','브레인TV','GOLF&PBA','빌리어즈TV'];
  const comp = {};
  channels.forEach(ch => {
    const vals = ds.map(d => d.comp[ch]).filter(v=>v!=null&&v>0);
    comp[ch] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
  });

  // 등급 분포
  const grade_counts = gradeSums;

  // 전체 프로그램 풀 (BEST/WORST용)
  const allProgs = ds.flatMap(d => d.all_programs || []);

  // 시청률 BEST5/WORST5
  const byRating = [...allProgs].sort((a,b) => b.시청률-a.시청률);
  const ratingBest5  = byRating.slice(0, 5);
  const ratingWorst5 = byRating.slice(-5).reverse();

  // 점유율 BEST5/WORST5
  const byShare = [...allProgs].sort((a,b) => b.점유율-a.점유율);
  const shareBest5  = byShare.slice(0, 5);
  const shareWorst5 = byShare.slice(-5).reverse();

  // 시청시간 BEST5/WORST5
  const byEngagement = [...allProgs].sort((a,b) => b.몰입률-a.몰입률);
  const engageBest5  = byEngagement.slice(0, 5);
  const engageWorst5 = byEngagement.slice(-5).reverse();

  return {
    avgRating, primeAvg, ccsAvg, saPct,
    slot_rating, slot_share, comp, grade_counts,
    ratingBest5, ratingWorst5,
    shareBest5, shareWorst5,
    engageBest5, engageWorst5,
    totalDays: ds.length,
  };
}

// 주간/월간 렌더 (anchor 기반)
function renderPeriod(mode, anchorDate) {
  selectedWeeks.clear();
  if (mode === 'weekly') {
    selectedWeeks.add(getWeekStart(anchorDate));
    if (currentMode === 'weekly') buildWeeklyPicker(document.getElementById('date-picker'));
  }
  const dates = getPeriodDates(mode, anchorDate);
  renderPeriodFromDates(dates, mode);
}

// 날짜 배열 기반 렌더
// weekStart → "n월 n주차" 변환
function getWeekLabel(ws) {
  const [y, m] = ws.split('-');
  const month = ws.slice(0, 7);
  // 해당 월의 모든 weekStart 목록에서 순번 계산
  const allWS = [...new Set(DATES.map(d => getWeekStart(d)))].sort()
    .filter(w => w.slice(0,7) === month);
  const wNum = allWS.indexOf(ws) + 1;
  return `${parseInt(m)}월 ${wNum}주차`;
}

function getWeeklySubLabel(dates) {
  if (!dates || !dates.length) return '';
  const fmt = d => d.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1년 $2월 $3일').replace(/월 0/,'월 ');
  return `${fmt(dates[0])} ~ ${fmt(dates[dates.length-1])} (${dates.length}일) 평균`;
}

function renderPeriodFromDates(dates, mode) {
  if (!dates.length) return;
  const agg = aggregatePeriod(dates);
  if (!agg) return;

  const label = `${dates[0]} ~ ${dates[dates.length-1]}`;
  document.getElementById('date-label').textContent = label;

  const saPct = agg.saPct;
  const main = document.getElementById('main-content');

  const gb = g => `<span class="badge b${(g||'').toLowerCase()}">${g||''}</span>`;
  const fmtMD = d => d ? `${parseInt(d.slice(5,7))}/${d.slice(8)}` : '';
  const bwRows = (list, color) => list.map(p => `
    <div class="bw-item" style="border-left-color:${color}">
      <span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재':'본'}</span>
      <span class="bw-name">${p.프로그램명}</span>
      ${p.날짜 ? `<span class="bw-slot" style="color:var(--muted)">${fmtMD(p.날짜)}</span>` : ''}
      <span class="bw-slot">${p.시간대}</span>
      ${gb(p.주등급)}
      <span class="bw-val" style="color:${color}">${(p.시청률||0).toFixed(3)}%</span>
    </div>`).join('');

  const shareRows = (list, color) => list.map(p => `
    <div class="bw-item" style="border-left-color:${color}">
      <span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재':'본'}</span>
      <span class="bw-name">${p.프로그램명}</span>
      ${p.날짜 ? `<span class="bw-slot" style="color:var(--muted)">${fmtMD(p.날짜)}</span>` : ''}
      <span class="bw-slot">${p.시간대}</span>
      ${gb(p.주등급)}
      <span class="bw-val" style="color:${color}">${(p.점유율||0).toFixed(3)}%</span>
    </div>`).join('');

  const engRows = (list, color) => list.map(p => `
    <div class="bw-item" style="border-left-color:${color}">
      <span class="pill ${p.재방?'pill-r':'pill-o'}">${p.재방?'재':'본'}</span>
      <span class="bw-name">${p.프로그램명}</span>
      ${p.날짜 ? `<span class="bw-slot" style="color:var(--muted)">${fmtMD(p.날짜)}</span>` : ''}
      <span class="bw-slot">${p.시간대}</span>
      ${gb(p.주등급)}
      <span class="bw-val" style="color:${color}">${((p.몰입률||0)*100).toFixed(1)}%</span>
    </div>`).join('');

  main.innerHTML = `
  <div class="kpi-row" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi" style="--kc:var(--s)">
      <div class="kpi-label">평균 시청률</div>
      <div class="kpi-value mono">${agg.avgRating.toFixed(3)}<span style="font-size:14px;font-weight:400">%</span></div>
      <div class="kpi-sub">${mode === 'monthly' ? `${parseInt(dates[0].slice(5,7))}월 평균` : getWeeklySubLabel(dates)}</div>
    </div>
    <div class="kpi" style="--kc:var(--b)">
      <div class="kpi-label">S/A 등급 비율</div>
      <div class="kpi-value">${saPct}<span style="font-size:14px;font-weight:400">%</span></div>
      <div class="kpi-sub">S: ${agg.grade_counts['S']||0}편 · A: ${agg.grade_counts['A']||0}편</div>
    </div>
    <div class="kpi" style="--kc:var(--rerun)">
      <div class="kpi-label">프라임 시청률</div>
      <div class="kpi-value mono">${agg.primeAvg != null ? agg.primeAvg.toFixed(3) : '-'}<span style="font-size:14px;font-weight:400">%</span></div>
      <div class="kpi-sub">프라임 시간대 평균</div>
    </div>
    <div class="kpi" style="--kc:var(--c)">
      <div class="kpi-label">레저채널 내 점유율</div>
      <div class="kpi-value mono">${agg.ccsAvg != null ? (agg.ccsAvg*100).toFixed(2) : '-'}<span style="font-size:14px;font-weight:400">%</span></div>
      <div class="kpi-sub">자사 ÷ (자사+경쟁채널)</div>
    </div>
  </div>

  <div class="row2">
    <div class="card">
      <div class="card-title">시간대별 평균 시청률 · 점유율</div>
      <div class="slot-bars" id="slot-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">프로그램 등급 비율</div>
      <div class="donut-wrap" style="margin:auto 0">
        <svg id="donut-svg" width="150" height="150" viewBox="0 0 150 150"></svg>
        <div class="donut-legend" id="donut-legend"></div>
      </div>
    </div>
  </div>

  <div class="row3">
    <div class="card">
      <div class="card-title">시청률 BEST · WORST <span style="font-size:10px;color:var(--muted);font-weight:400">TOP 5</span></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px">▲ BEST</div>
      <div class="bw-list">${bwRows(agg.ratingBest5,'var(--s)')}</div>
      <div style="font-size:10px;color:var(--muted);margin:14px 0 8px;letter-spacing:0.5px">▼ WORST</div>
      <div class="bw-list">${bwRows(agg.ratingWorst5,'var(--c)')}</div>
    </div>
    <div class="card">
      <div class="card-title">점유율 BEST · WORST <span style="font-size:10px;color:var(--muted);font-weight:400">TOP 5</span></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px">▲ BEST</div>
      <div class="bw-list">${shareRows(agg.shareBest5,'var(--s)')}</div>
      <div style="font-size:10px;color:var(--muted);margin:14px 0 8px;letter-spacing:0.5px">▼ WORST</div>
      <div class="bw-list">${shareRows(agg.shareWorst5,'var(--c)')}</div>
    </div>
    <div class="card">
      <div class="card-title">몰입률 BEST · WORST <span style="font-size:10px;color:var(--muted);font-weight:400">TOP 5</span></div>
      <div style="font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:0.5px">▲ BEST</div>
      <div class="bw-list">${engRows(agg.engageBest5,'var(--s)')}</div>
      <div style="font-size:10px;color:var(--muted);margin:14px 0 8px;letter-spacing:0.5px">▼ WORST</div>
      <div class="bw-list">${engRows(agg.engageWorst5,'var(--c)')}</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:0">
    <div class="card-title">경쟁채널 시청률 비교</div>
    <div id="comp-bars" style="margin:auto 0"></div>
  </div>
  `;

  renderSlotBars({ slot_rating: agg.slot_rating, slot_share: agg.slot_share });
  renderDonut({ grade_counts: agg.grade_counts }, null);
  renderComp({ comp: agg.comp });
}
</script>
